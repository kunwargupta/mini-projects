<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="" type="image/x-icon">
</head>
<body>
    <div class="card">
        <div class="search-here">
            <input type="text" name="" id="" placeholder="Enter City Name" spellcheck="true">
            <button><img src="/weather-app-img/search.png" alt=""></button>
        </div>

        <div class="weather">
            <img class="weather-icon" src="/weather-app-img/rain.png" alt="">
        <h1 class="temp">33°C</h1>
    <h2 class="city">New York</h2>


    <div class="details">
        <div class="col">
            <img src="/weather-app-img/humidity.png" alt="">
            <div>
                <p class="humidity">50%</p>
                <p>Humidity</p>
            </div>
        </div>
        <div class="col">
            <img src="/weather-app-img/wind.png" alt="">
            <div>
                <p class="wind">13 Km/h</p>
                <p>wind Speed</p>
            </div>
        </div>
    </div>
</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
